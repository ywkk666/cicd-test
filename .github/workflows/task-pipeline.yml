name: Task Type Pipeline

on:
  pull_request:
    branches: 
        - main
        - develop
  push:
    branches:
        - main
        - develop
        - feat/*
        - bugfix/*

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 1. 任务类型检测
  detect-task-type:
      runs-on: ubuntu-latest
      outputs:
        task_type: ${{ steps.detect.outputs.task_type }}
      steps:
        - name: 识别模式（多标签兼容版）
          id: detect
          run: |
                    # 获取当前分支名
                    # 在 PR 触发时使用 head_ref，在 Push 触发时使用 ref_name
                    BRANCH_NAME="${{ github.head_ref || github.ref_name }}"
                    echo "检测到分支: $BRANCH_NAME"

                    # 使用正则表达式或通配符判断后缀
                    if [[ "$BRANCH_NAME" == *"-test" ]]; then
                      echo "task_type=test" >> $GITHUB_OUTPUT
                      echo "🎯 匹配结果: [TEST] 模式"
                    elif [[ "$BRANCH_NAME" == *"-dev" ]]; then
                      echo "task_type=dev" >> $GITHUB_OUTPUT
                      echo "🎯 匹配结果: [DEV] 模式"
                    else
                      # 如果分支名不符合规范，默认走 dev 以保证流程不中断
                      echo "task_type=dev" >> $GITHUB_OUTPUT
                      echo "🎯 匹配结果: [DEFAULT] 模式"
                    fi
                    
  # 2. 开发类型流水线
  dev-pipeline:
    needs: detect-task-type
    if: needs.detect-task-type.outputs.task_type == 'dev'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 安装依赖
        run: |
          pip install pandas ruamel.yaml pytest flake8

      - name: 静态检查
        continue-on-error: true # 允许静态检查失败
        run: |
          flake8 dev_scripts/ --count --select=E9,F63,F7,F82 --show-source

      - name: 执行任务
        run: |
          # 并行执行，确保某个脚本失败时另一个仍继续运行
          set +e
          python dev_scripts/build.py > build.log 2>&1 &
          pid_build=$!
          python dev_scripts/deploy.py > deploy.log 2>&1 &
          pid_deploy=$!

          wait $pid_build
          build_exit=$?
          wait $pid_deploy
          deploy_exit=$?

          # 打印日志方便调试
          cat build.log
          cat deploy.log

          # 两个脚本都跑完后再统一判定
          if [ $build_exit -ne 0 ] || [ $deploy_exit -ne 0 ]; then
            echo "❌ dev 流水线失败: build_exit=$build_exit, deploy_exit=$deploy_exit"
            exit 1
          fi

      - name: 生成 AI 分析报告（dev）
        if: always()
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
        run: |
          python .github/scripts/ci_report_ai.py \
            --mode dev \
            --provider zhipu \
            --log "build脚本=build.log" \
            --log "deploy脚本=deploy.log" >> "$GITHUB_STEP_SUMMARY"

  # 3. 测试类型流水线
  test-pipeline:
    needs: detect-task-type
    if: needs.detect-task-type.outputs.task_type == 'test'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 安装依赖
        run: |
          pip install pandas ruamel.yaml pytest flake8

      - name: 静态检查
        run: |
          # 确保目录存在
          mkdir -p test_scripts
          flake8 test_scripts/ --count --select=E9,F63,F7,F82 --show-source

      - name: 并行运行测试脚本
        run: |
          # 并行运行多个测试脚本，单个失败不影响另一个继续执行
          set +e
          python test_scripts/test_api.py > test_api.log 2>&1 &
          pid_api=$!
          python test_scripts/test_performance.py > test_performance.log 2>&1 &
          pid_perf=$!

          wait $pid_api
          api_exit=$?
          wait $pid_perf
          perf_exit=$?
          
          echo "=== test_api.py 执行结果 ==="
          cat test_api.log
          echo "=== test_performance.py 执行结果 ==="
          cat test_performance.log

          # 两个脚本都跑完后再统一判定
          if [ $api_exit -ne 0 ] || [ $perf_exit -ne 0 ]; then
            echo "❌ test 脚本失败: api_exit=$api_exit, perf_exit=$perf_exit"
            exit 1
          fi

      - name: 运行 pytest 测试
        run: |
          # 运行 pytest，如果没有测试用例会返回代码 5，这里简单处理
          pytest --tb=short || echo "No tests found or tests failed"

      - name: 生成 AI 分析报告（test）
        if: always()
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
        run: |
          python .github/scripts/ci_report_ai.py \
            --mode test \
            --provider zhipu \
            --log "api测试脚本=test_api.log" \
            --log "性能测试脚本=test_performance.log" >> "$GITHUB_STEP_SUMMARY"