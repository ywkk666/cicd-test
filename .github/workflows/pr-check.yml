name: Task Logic & PR Check

on:
  pull_request:
    branches: [ "main" ]

jobs:
  validate-logic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 安装 test1.py 所需的依赖
        run: |
          pip install pandas ruamel.yaml pytest flake8
          # 如果 test1.py 还有其他依赖，记得写在这里

      - name: 静态检查 - 扫描 test1.py
        run: |
          # 专门盯着你的核心文件看
          flake8 helloword/test1.py --count --select=E9,F63,F7,F82 --show-source

      - name: 冒烟测试 - 试运行 test1.py
        run: |
          # 尝试运行一下这个文件，确保它不会报错崩溃
          # 如果 test1.py 运行需要参数，可以在这里加上
          python helloword/test1.py || exit 1

      - name: 数据一致性检查
        run: |
          # 修正：使用 ruamel.yaml 进行解析校验
          python -c "from ruamel.yaml import YAML; YAML().load(open('task_center/tasks.yaml'))"